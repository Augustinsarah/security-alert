<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Security Alert</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    #bootScreen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      cursor: pointer;
      border-radius: 10px;
    }

    #confirm {
      background: red;
      color: white;
    }

    #decline {
      background: gray;
      color: white;
    }

    #monitor {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    #code {
      white-space: pre-line;
    }
  </style>
</head>

<body>

<!-- START SCREEN -->
<div id="bootScreen">
  <h1>SECURITY ACCESS REQUEST</h1>
  <p>Unknown system detected...</p>

  <button id="decline">Decline</button>
  <button id="confirm">Confirm</button>
</div>

<!-- MONITOR SCREEN -->
<div id="monitor">
  <div id="code">AWAITING CONFIRMATION...</div>
</div>

<script src="script.js"></script>

</body>
</html>
