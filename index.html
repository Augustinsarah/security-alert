<!DOCTYPE html>
<html>
<head>
  <title>Security Alert</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="bootScreen">
  <h1>SECURITY ACCESS REQUEST</h1>
  <p>Unknown system detected...</p>

  <button id="decline">Decline</button>
  <button id="confirm">Confirm</button>
</div>

<div id="monitor">
  <div id="code"></div>
</div>

<!-- 🔊 AUDIO (VERY IMPORTANT) -->
<audio id="monitorSound" src="https://actions.google.com/sounds/v1/alarms/medical_monitor_beep.ogg"></audio>
<audio id="heartSound" src="https://actions.google.com/sounds/v1/alarms/heartbeat_fast.ogg"></audio>

<script src="script.js"></script>

</body>
</html>
